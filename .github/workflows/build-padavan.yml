name: Build Padavan

on: 
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
    - 'v*'
  watch:
    types: [started]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        # 補齊所有現代編譯依賴
        sudo apt-get -y install unzip libtool-bin curl cmake gperf gawk flex bison nano xxd fakeroot \
        cpio git python3-docutils gettext automake autopoint texinfo build-essential help2man \
        pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget \
        libssl-dev
        echo "CFLAGS=-w" >> $GITHUB_ENV
        echo "CXXFLAGS=-w" >> $GITHUB_ENV

    - name: Clone source code
      run: |
        sudo git clone --depth=1 https://github.com/chongshengB/rt-n56u.git /opt/rt-n56u
        sudo chown -R $USER:$USER /opt/rt-n56u

    - name: Build Firmware
      env:
        TNAME: RM2100
      run: |
        cd /opt/rt-n56u/trunk
        
        # 移除編譯錯誤檢查
        find . -name "*.mk" -type f -exec sed -i 's/-Werror//g' {} +
        
        cp -f configs/templates/$TNAME.config .config
        
        # 功能清單注入
        sed -i '/CONFIG_FIRMWARE_INCLUDE_/d' .config
        cat >> .config <<EOF
        CONFIG_FIRMWARE_INCLUDE_SHADOWSOCKS=y
        CONFIG_FIRMWARE_INCLUDE_ADBYBY=y
        CONFIG_FIRMWARE_INCLUDE_SMARTDNS=y
        CONFIG_FIRMWARE_INCLUDE_XRAY=y
        CONFIG_FIRMWARE_INCLUDE_DDNSTO=y
        CONFIG_FIRMWARE_INCLUDE_ZEROTIER=y
        CONFIG_FIRMWARE_INCLUDE_ALIDDNS=y
        CONFIG_FIRMWARE_INCLUDE_KOOLPROXY=y
        CONFIG_FIRMWARE_INCLUDE_CADDY=y
        CONFIG_FIRMWARE_INCLUDE_ADGUARDHOME=y
        CONFIG_FIRMWARE_INCLUDE_WYY=y
        EOF

        # 修改預設值
        CFG=$(find . -name "defaults.c" | grep "user/shared" | head -n 1)
        if [ -f "$CFG" ]; then
          sed -i 's/"admin"/"cliinf88"/' "$CFG"
          sed -i 's/"ASUS"/"GoodHouse"/' "$CFG"
          sed -i 's/"ASUS_5G"/"GoodHouse_5G"/' "$CFG"
          sed -i 's/"1234567890"/"16881688"/g' "$CFG"
        fi
        
        # 開始編譯
        sudo ./clear_tree
        sudo ./build_firmware_modify $TNAME 0

        mkdir -p /opt/images/

        if ls images/*.trx >/dev/null 2>&1; then
          sudo mv -f images/*.trx /opt/images/
        fi

    - name: Upload packages
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Padavan-firmware
        path: /opt/images
