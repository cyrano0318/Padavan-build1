name: Build Padavan

on: 
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
    - 'v*'
  watch:
    types: [started]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        # 補齊所有編譯依賴，特別是 libssl-dev 與 zlib，解決 OpenSSL 偵測問題
        sudo apt-get -y install unzip libtool-bin curl cmake gperf gawk flex bison nano xxd fakeroot \
        cpio git python3-docutils gettext automake autopoint texinfo build-essential help2man \
        pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget \
        libssl-dev libssl1.1
        echo "CFLAGS=-w" >> $GITHUB_ENV
        echo "CXXFLAGS=-w" >> $GITHUB_ENV

    - name: Clone source code
      run: |
        sudo git clone --depth=1 https://github.com/chongshengB/rt-n56u.git /opt/rt-n56u
        sudo chown -R $USER:$USER /opt/rt-n56u
        cd /opt/rt-n56u/toolchain-mipsel
        sh dl_toolchain.sh
        mkdir -p /opt/images/

    - name: Build Firmware
      env:
        TNAME: RM2100
      run: |
        cd /opt/rt-n56u/trunk
        
        # 1. 強制預先下載所有依賴，避開 Makefile 裡的網路錯誤
        # 這裡我們手動下載所有可能遺失的壓縮檔到指定目錄
        mkdir -p user/htop tools/go user/shared/zlib
        curl -L -o user/htop/htop-3.0.2.tar.gz https://github.com/htop-dev/htop/releases/download/3.0.2/htop-3.0.2.tar.gz
        curl -L -o tools/go/go1.15.2.linux-amd64.tar.gz https://dl.google.com/go/go1.15.2.linux-amd64.tar.gz
        curl -L -o user/shared/zlib/zlib-1.2.11.tar.gz https://zlib.net/fossils/zlib-1.2.11.tar.gz
        
        # 2. 標記已下載，防止 Makefile 再去下載
        touch user/htop/htop-3.0.2.tar.gz tools/go/go1.15.2.linux-amd64.tar.gz user/shared/zlib/zlib-1.2.11.tar.gz
        
        # 3. 徹底關閉所有 wget 依賴，避免循環依賴錯誤
        find . -name "Makefile" -type f -exec sed -i 's|wget|echo "skip wget"|g' {} +
        find . -name "*.mk" -type f -exec sudo sed -i 's/-Werror//g' {} +
        
        cp -f configs/templates/$TNAME.config .config
        
        # 4. 配置功能清單
        sed -i '/CONFIG_FIRMWARE_INCLUDE_/d' .config
        cat >> .config <<EOF
        CONFIG_FIRMWARE_INCLUDE_SHADOWSOCKS=y
        CONFIG_FIRMWARE_INCLUDE_ADBYBY=y
        CONFIG_FIRMWARE_INCLUDE_SMARTDNS=y
        CONFIG_FIRMWARE_INCLUDE_XRAY=y
        CONFIG_FIRMWARE_INCLUDE_DDNSTO=y
        CONFIG_FIRMWARE_INCLUDE_ZEROTIER=y
        CONFIG_FIRMWARE_INCLUDE_ALIDDNS=y
        CONFIG_FIRMWARE_INCLUDE_KOOLPROXY=y
        CONFIG_FIRMWARE_INCLUDE_CADDY=y
        CONFIG_FIRMWARE_INCLUDE_ADGUARDHOME=y
        CONFIG_FIRMWARE_INCLUDE_WYY=y
        EOF

        # 5. 修改系統參數
        USER_CONFIG=$(find . -name "user_config.h" | head -n 1)
        [ -f "$USER_CONFIG" ] && sudo sed -i 's/192.168.2.1/192.168.31.1/g' "$USER_CONFIG"
        
        # 6. 最後處理：強制指向正確的編譯器路徑（解決 OpenSSL 問題）
        export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig
        
        sudo ./clear_tree
        sudo ./build_firmware_modify $TNAME 0
        sudo mv -f images/*.trx /opt/images/

    - name: Upload packages
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Padavan-packages
        path: /opt/images
