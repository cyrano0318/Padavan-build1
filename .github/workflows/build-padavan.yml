name: Build Padavan

on: 
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
    - 'v*'
  watch:
    types: [started]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get -y install unzip libtool-bin curl cmake gperf gawk flex bison nano xxd fakeroot \
        cpio git python3-docutils gettext automake autopoint texinfo build-essential help2man \
        pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget
        echo "CFLAGS=-w" >> $GITHUB_ENV
        echo "CXXFLAGS=-w" >> $GITHUB_ENV

    - name: Clone source code
      run: |
        sudo git clone --depth=1 https://github.com/chongshengB/rt-n56u.git /opt/rt-n56u
        sudo chown -R $USER:$USER /opt/rt-n56u
        cd /opt/rt-n56u/toolchain-mipsel
        sh dl_toolchain.sh
        mkdir -p /opt/images/

    - name: Build Firmware
      env:
        TNAME: RM2100
      run: |
        cd /opt/rt-n56u/trunk
        
        # 1. 直接預載所有依賴，並觸發「安裝標記」，讓 Makefile 以為已經下載成功，跳過下載步驟
        mkdir -p user/htop && curl -L -o user/htop/htop-3.0.2.tar.gz https://github.com/htop-dev/htop/releases/download/3.0.2/htop-3.0.2.tar.gz
        mkdir -p tools/go && curl -L -o tools/go/go1.15.2.linux-amd64.tar.gz https://dl.google.com/go/go1.15.2.linux-amd64.tar.gz
        mkdir -p user/shared/zlib && curl -L -o user/shared/zlib/zlib-1.2.11.tar.gz https://zlib.net/fossils/zlib-1.2.11.tar.gz
        
        # 建立下載標記檔案，這是讓 Makefile 判斷已下載的關鍵
        touch user/htop/htop-3.0.2.tar.gz
        touch tools/go/go1.15.2.linux-amd64.tar.gz
        touch user/shared/zlib/zlib-1.2.11.tar.gz

        # 2. 移除所有 Werror，並修復編譯環境
        find . -name "*.mk" -type f -exec sudo sed -i 's/-Werror//g' {} +
        
        cp -f configs/templates/$TNAME.config .config
        
        # 3. 插件配置（使用 echo 直接追加，不破壞原有結構）
        sed -i '/CONFIG_FIRMWARE_INCLUDE_/d' .config
        cat >> .config <<EOF
        CONFIG_FIRMWARE_INCLUDE_SHADOWSOCKS=y
        CONFIG_FIRMWARE_INCLUDE_ADBYBY=y
        CONFIG_FIRMWARE_INCLUDE_SMARTDNS=y
        CONFIG_FIRMWARE_INCLUDE_XRAY=y
        CONFIG_FIRMWARE_INCLUDE_DDNSTO=y
        CONFIG_FIRMWARE_INCLUDE_ZEROTIER=y
        CONFIG_FIRMWARE_INCLUDE_ALIDDNS=y
        CONFIG_FIRMWARE_INCLUDE_KOOLPROXY=y
        CONFIG_FIRMWARE_INCLUDE_CADDY=y
        CONFIG_FIRMWARE_INCLUDE_ADGUARDHOME=y
        CONFIG_FIRMWARE_INCLUDE_WYY=y
        EOF

        # 4. 系統變數注入
        USER_CONFIG=$(find . -name "user_config.h" | head -n 1)
        [ -f "$USER_CONFIG" ] && sudo sed -i 's/192.168.2.1/192.168.31.1/g' "$USER_CONFIG"
        
        CFG=$(find . -name "defaults.c" | grep "user/shared" | head -n 1)
        if [ -f "$CFG" ]; then
          sudo sed -i 's/"admin"/"cliinf88"/' "$CFG"
          sudo sed -i 's/"ASUS"/"GoodHouse"/' "$CFG"
          sudo sed -i 's/"ASUS_5G"/"GoodHouse_5G"/' "$CFG"
          sudo sed -i 's/"1234567890"/"16881688"/g' "$CFG"
          sudo sed -i 's/"zerotier_enable", "0"/"zerotier_enable", "1"/' "$CFG"
          sudo sed -i 's/"zerotier_id", ""/"zerotier_id", "6021298db4fa33c2"/' "$CFG"
          sudo sed -i 's|"ForwardList", ""|"ForwardList", "1>0>10121>192.168.31.101>10121>Game1\\\\n1>0>10180>192.168.31.101>80>Web1"|' "$CFG"
        fi
        
        sudo ./clear_tree
        sudo ./build_firmware_modify $TNAME 0
        sudo mv -f images/*.trx /opt/images/

    - name: Upload packages
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Padavan-packages
        path: /opt/images
