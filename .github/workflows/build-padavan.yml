name: Build Padavan

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  watch:
    types: [started]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update

        sudo apt-get -y install \
          unzip \
          libtool-bin \
          curl \
          cmake \
          gperf \
          gawk \
          flex \
          bison \
          nano \
          xxd \
          fakeroot \
          cpio \
          git \
          python3-docutils \
          gettext \
          automake \
          autopoint \
          texinfo \
          build-essential \
          help2man \
          pkg-config \
          zlib1g-dev \
          libgmp3-dev \
          libmpc-dev \
          libmpfr-dev \
          libncurses5-dev \
          libltdl-dev \
          wget \
          libssl-dev

    - name: Clone source code
      env:
        KERNEL: 3.4
      run: |

        if [ "$KERNEL" = "4.4" ]; then
          git clone --depth=1 https://github.com/MeIsReallyBa/padavan-4.4.git /opt/rt-n56u
        else
          git clone --depth=1 https://github.com/chongshengB/rt-n56u.git /opt/rt-n56u
        fi

        #
        # 下載 Toolchain
        #
        cd /opt/rt-n56u/toolchain-mipsel
        chmod +x dl_toolchain.sh
        ./dl_toolchain.sh

        #
        # 修正失效的 Go Mirror
        #
        cd /opt/rt-n56u/trunk

        find . -type f \( -name "Makefile" -o -name "*.mk" \) \
          -exec sed -i \
          's#https://gomirrors.org/dl/go/#https://dl.google.com/go/#g' {} +

        mkdir -p /opt/images

    - name: Build Firmware
      env:
        TNAME: RM2100
        KERNEL: 3.4
      run: |

        cd /opt/rt-n56u/trunk

        #
        # 預先下載 Go
        # 避免 gomirrors.org 卡死
        #
        mkdir -p tools/go

        if [ ! -f tools/go/go1.15.2.linux-amd64.tar.gz ]; then
          wget -q --show-progress \
            https://dl.google.com/go/go1.15.2.linux-amd64.tar.gz \
            -O tools/go/go1.15.2.linux-amd64.tar.gz
        fi

        ls -lh tools/go/go1.15.2.linux-amd64.tar.gz

        if [ ! -f configs/templates/$TNAME.config ]; then
          echo "configs/templates/$TNAME.config not found"
          exit 1
        fi

        cp -f configs/templates/$TNAME.config .config

        sed -i 's/CONFIG_FIRMWARE_INCLUDE_OPENSSL_EXE=n/CONFIG_FIRMWARE_INCLUDE_OPENSSL_EXE=y/g' .config

        #
        # 清除舊設定
        #
        sed -i '/CONFIG_FIRMWARE_INCLUDE_MENTOHUST/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_SCUTCLIENT/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_SHADOWSOCKS/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_SSSERVER/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_DNSFORWARDER/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_ADBYBY/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_FRPC/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_FRPS/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_TUNSAFE/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_ALIDDNS/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_SMARTDNS/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_SRELAY/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_ZEROTIER/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_KOOLPROXY/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_CADDY/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_ADGUARDHOME/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_WYY/d' .config

        #
        # 功能設定
        #
        echo "CONFIG_FIRMWARE_INCLUDE_MENTOHUST=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SCUTCLIENT=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SHADOWSOCKS=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SSOBFS=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SSSERVER=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_DNSFORWARDER=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_ADBYBY=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_FRPC=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_FRPS=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_TUNSAFE=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_ALIDDNS=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SMARTDNS=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SMARTDNSBIN=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_KOOLPROXY=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_CADDY=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_CADDYBIN=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_ADGUARDHOME=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SRELAY=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_WYY=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_WYYBIN=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_ZEROTIER=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_XRAY=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_DDNSTO=y" >> .config

        #
        # WiFi / 密碼
        #
        CFG=$(find . -name defaults.c | head -n 1)

        if [ -n "$CFG" ]; then

          sed -i 's/"admin"/"cliinf88"/g' "$CFG" || true

          sed -i 's/"ASUS"/"GoodHouse"/g' "$CFG" || true
          sed -i 's/"ASUS_5G"/"GoodHouse_5G"/g' "$CFG" || true

          sed -i 's/"1234567890"/"16881688"/g' "$CFG" || true

        fi

        #
        # 客製化開機腳本
        #
        mkdir -p user/scripts

        cat > user/scripts/post_wan_script.sh <<'EOF'
#!/bin/sh

nvram set lan_ipaddr=192.168.31.1

nvram set http_username=admin
nvram set http_passwd=cliinf88

nvram set rt_ssid="GoodHouse"
nvram set wl_ssid="GoodHouse_5G"

nvram set wifi_psk="16881688"

nvram set misc_nat_rulelist="10121>192.168.31.101:10121
10180>192.168.31.101:80"

nvram commit

if [ -x /usr/bin/zerotier-cli ]; then
    zerotier-cli join 6021298db4fa33c2
fi

exit 0
EOF

        chmod +x user/scripts/post_wan_script.sh

        #
        # 開始編譯
        #
        sudo ./clear_tree
        sudo ./build_firmware_modify $TNAME 0

        mkdir -p /opt/images

        if ls images/*.trx >/dev/null 2>&1; then
          sudo mv -f images/*.trx /opt/images/
        fi

    - name: Upload packages
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Padavan-RM2100
        path: /opt/images
