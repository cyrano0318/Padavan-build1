name: Build Padavan RM2100

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  watch:
    types: [started]

jobs:
  build:

    runs-on: ubuntu-22.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4


    ############################################################
    # 安裝編譯環境
    ############################################################
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          unzip \
          libtool-bin \
          autoconf \
          curl \
          cmake \
          gperf \
          gawk \
          flex \
          bison \
          nano \
          xxd \
          fakeroot \
          cpio \
          git \
          python3-docutils \
          gettext \
          automake \
          autopoint \
          texinfo \
          build-essential \
          help2man \
          pkg-config \
          zlib1g-dev \
          libgmp3-dev \
          libmpc-dev \
          libmpfr-dev \
          libncurses5-dev \
          libltdl-dev \
          wget \
          libssl-dev


    ############################################################
    # 下載 Padavan source
    ############################################################

    - name: Clone source code

      env:
        KERNEL: 3.4

      run: |

        git clone --depth=1 \
          https://github.com/chongshengB/rt-n56u.git \
          /opt/rt-n56u


        cd /opt/rt-n56u/toolchain-mipsel


        chmod +x dl_toolchain.sh


        ./dl_toolchain.sh


        ################################################
        # 確認 toolchain
        ################################################

        TOOLCHAIN=/opt/rt-n56u/toolchain-mipsel/toolchain-3.4.x/bin/mipsel-linux-uclibc-gcc


        if [ ! -f "$TOOLCHAIN" ]; then

          echo "ERROR: toolchain gcc missing"

          find /opt/rt-n56u/toolchain-mipsel -name "*gcc"

          exit 1

        fi


        cd /opt/rt-n56u/trunk


        ################################################
        # 修正失效下載來源
        ################################################

        find . -type f \
        \( -name "Makefile" -o -name "*.mk" \) \
        -exec sed -i \
        's#https://gomirrors.org/dl/go/#https://dl.google.com/go/#g' {} \;


        find . -type f \
        \( -name "Makefile" -o -name "*.mk" \) \
        -exec sed -i \
        's#https://bintray.com/htop/source/download_file?file_path=htop-3.0.2.tar.gz#https://old-releases.ubuntu.com/ubuntu/pool/main/h/htop/htop_3.0.2.orig.tar.gz#g' {} \;


        echo "==== Check old download url ===="

        grep -R "bintray.com" . 2>/dev/null || true

        grep -R "gomirrors.org" . 2>/dev/null || true


        mkdir -p /opt/images

    ############################################################
    # 編譯 Firmware
    ############################################################

    - name: Build Firmware

      env:

        TNAME: RM2100

        KERNEL: 3.4


      run: |


        cd /opt/rt-n56u/trunk


        ################################################
        # 預下載 Go
        ################################################

        mkdir -p tools/go


        if [ ! -f tools/go/go1.15.2.linux-amd64.tar.gz ]; then

          wget \
          --tries=5 \
          --timeout=30 \
          --connect-timeout=20 \
          --show-progress \
          https://dl.google.com/go/go1.15.2.linux-amd64.tar.gz \
          -O tools/go/go1.15.2.linux-amd64.tar.gz

        fi


        ################################################
        # 預下載 htop
        ################################################
        mkdir -p user/htop
        if [ ! -f user/htop/htop-3.0.2.tar.gz ]; then
          wget \
          --tries=5 \
          --timeout=30 \
          --connect-timeout=20 \
          --show-progress \
          https://github.com/htop-dev/htop/archive/refs/tags/3.0.2.tar.gz \
          -O user/htop/htop-3.0.2.tar.gz
          fi
        ################################################
        # 產生 htop configure
        ################################################
        cd user/htop
        rm -rf htop-3.0.2
        tar zxf htop-3.0.2.tar.gz
        cd htop-3.0.2
        if [ ! -f configure ]; then
          autoreconf -fi
        fi
        cd ../../..

        ls -lh tools/go/go1.15.2.linux-amd64.tar.gz
        ls -lh user/htop/htop-3.0.2.tar.gz


        ################################################
        # 載入 RM2100 設定
        ################################################

        if [ ! -f configs/templates/$TNAME.config ]; then

          echo "Missing RM2100 template"

          exit 1

        fi


        cp -f configs/templates/$TNAME.config .config



        sed -i \
        's/CONFIG_FIRMWARE_INCLUDE_OPENSSL_EXE=n/CONFIG_FIRMWARE_INCLUDE_OPENSSL_EXE=y/g' \
        .config


        ################################################
        # 清除舊功能設定
        ################################################

        sed -i '/CONFIG_FIRMWARE_INCLUDE_MENTOHUST/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_SCUTCLIENT/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_SHADOWSOCKS/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_SSSERVER/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_DNSFORWARDER/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_ADBYBY/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_FRPC/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_FRPS/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_TUNSAFE/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_ALIDDNS/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_SMARTDNS/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_SMARTDNSBIN/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_SRELAY/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_ZEROTIER/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_KOOLPROXY/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_CADDY/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_ADGUARDHOME/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_WYY/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_XRAY/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_DDNSTO/d' .config


        ################################################
        # 加入功能
        ################################################

        echo "CONFIG_FIRMWARE_INCLUDE_MENTOHUST=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SCUTCLIENT=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SHADOWSOCKS=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SSOBFS=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SSSERVER=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_DNSFORWARDER=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_ADBYBY=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_FRPC=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_FRPS=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_TUNSAFE=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_ALIDDNS=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SMARTDNS=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SMARTDNSBIN=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_KOOLPROXY=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_CADDY=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_CADDYBIN=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_ADGUARDHOME=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SRELAY=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_WYY=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_WYYBIN=n" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_ZEROTIER=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_XRAY=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_DDNSTO=y" >> .config

        echo "CONFIG_FIRMWARE_INCLUDE_DDNSTO=y" >> .config


        ################################################
        # 修改 RM2100 預設值
        ################################################

        DEFAULT_FILE=$(find . -name "defaults.c" | head -n 1)


        if [ -n "$DEFAULT_FILE" ]; then

          echo "Modify $DEFAULT_FILE"


          sed -i 's/ASUS_5G/GoodHouse_5G/g' "$DEFAULT_FILE"

          sed -i 's/ASUS/GoodHouse/g' "$DEFAULT_FILE"

          sed -i 's/1234567890/16881688/g' "$DEFAULT_FILE"

        fi



        ################################################
        # 開機自訂設定
        ################################################

        mkdir -p user/scripts


        cat > user/scripts/post_wan_script.sh <<'EOF'
        #!/bin/sh
        nvram set lan_ipaddr="192.168.31.1"
        nvram set http_username="admin"
        nvram set http_passwd="cliinf88"
        nvram set wl0_ssid="GoodHouse"
        nvram set wl1_ssid="GoodHouse_5G"
        nvram set wl0_wpa_psk="16881688"
        nvram set wl1_wpa_psk="16881688"
        nvram set misc_nat_rulelist="10121>192.168.31.101:10121 10180>192.168.31.101:80"
        
        if [ -x /usr/bin/zerotier-cli ]; then
        sleep 20
        zerotier-cli join 6021298db4fa33c2
        fi
        nvram commit
        exit 0
        EOF

        chmod +x user/scripts/post_wan_script.sh
        ################################################
        # 開始編譯
        ################################################
        sudo ./clear_tree
        sudo ./build_firmware_modify $TNAME 0
        ################################################
        # 輸出 Firmware
        ################################################
        mkdir -p /opt/images
        if ls images/*.trx >/dev/null 2>&1; then
          sudo mv -f images/*.trx /opt/images/
        else
          echo "No firmware generated"
          exit 1
        fi
    ############################################################
    # 上傳 Firmware
    ############################################################
    - name: Upload packages
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Padavan-RM2100
        path: /opt/images
