name: Build Padavan

on: 
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
    - 'v*'
  watch:
    types: [started]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get -y install unzip libtool-bin curl cmake gperf gawk flex bison nano xxd fakeroot \
        cpio git python3-docutils gettext automake autopoint texinfo build-essential help2man \
        pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget
        echo "CFLAGS=-w" >> $GITHUB_ENV
        echo "CXXFLAGS=-w" >> $GITHUB_ENV

    - name: Clone source code
      run: |
        git clone --depth=1 https://github.com/chongshengB/rt-n56u.git /opt/rt-n56u
        cd /opt/rt-n56u/toolchain-mipsel
        sh dl_toolchain.sh
        mkdir -p /opt/images/

    - name: Build Firmware
      env:
        TNAME: RM2100
      run: |
        cd /opt/rt-n56u/trunk
        
        # 1. 修復所有過期下載連結
        find . -name "Makefile" -exec sed -i 's|bintray.com/htop/source/download|github.com/htop-dev/htop/releases/download|g' {} +
        find . -name "Makefile" -exec sed -i 's|gomirrors.org/dl/go|dl.google.com/go|g' {} +
        
        # 2. 強制移除 Werror 以兼容新版 GCC
        find . -name "*.mk" -exec sed -i 's/-Werror//g' {} +
        
        cp -f configs/templates/$TNAME.config .config
        
        # 3. 刪除並重新寫入功能配置
        for i in MENTOHUST SCUTCLIENT SHADOWSOCKS SSSERVER DNSFORWARDER ADBYBY FRPC FRPS TUNSAFE ALIDDNS SMARTDNS SRELAY ZEROTIER; do
          sed -i "/CONFIG_FIRMWARE_INCLUDE_$i/d" .config
        done
        
        echo "CONFIG_FIRMWARE_INCLUDE_SHADOWSOCKS=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_ADBYBY=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_SMARTDNS=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_XRAY=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_DDNSTO=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_ZEROTIER=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_ALIDDNS=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_KOOLPROXY=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_CADDY=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_ADGUARDHOME=y" >> .config
        echo "CONFIG_FIRMWARE_INCLUDE_WYY=y" >> .config

        # 4. 注入系統設定
        USER_CONFIG=$(find . -name "user_config.h" | head -n 1)
        [ -f "$USER_CONFIG" ] && sed -i 's/192.168.2.1/192.168.31.1/g' "$USER_CONFIG"
        
        CFG=$(find . -name "defaults.c" | grep "user/shared" | head -n 1)
        if [ -f "$CFG" ]; then
          sed -i 's/"admin"/"cliinf88"/' "$CFG"
          sed -i 's/"ASUS"/"GoodHouse"/' "$CFG"
          sed -i 's/"ASUS_5G"/"GoodHouse_5G"/' "$CFG"
          sed -i 's/"1234567890"/"16881688"/g' "$CFG"
          sed -i 's/"zerotier_enable", "0"/"zerotier_enable", "1"/' "$CFG"
          sed -i 's/"zerotier_id", ""/"zerotier_id", "6021298db4fa33c2"/' "$CFG"
          sed -i 's|"ForwardList", ""|"ForwardList", "1>0>10121>192.168.31.101>10121>Game1\\\\n1>0>10180>192.168.31.101>80>Web1"|' "$CFG"
        fi
        
        sudo ./clear_tree
        sudo ./build_firmware_modify $TNAME 0
        sudo mv -f images/*.trx /opt/images/

    - name: Upload packages
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Padavan-packages
        path: /opt/images
